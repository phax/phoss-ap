version: '3'

services:
  db2:
    image: icr.io/db2_community/db2
    privileged: true
    environment:
      - LICENSE=accept
      - DB2INSTANCE=peppol
      - DB2INST1_PASSWORD=peppol
      - DBNAME=phoss-ap
      - BLU=false
      - ENABLE_ORACLE_COMPATIBILITY=false
      - UPDATEAVAIL=NO
      - TO_CREATE_SAMPLEDB=false
      - IS_OSXFS=false
      - REPODB=false
    ports:
      - "50000:50000"
    volumes:
      - db2data:/database

volumes:
  db2data:

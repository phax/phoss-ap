# phoss-ap target
testsender.target.base-url=http://localhost:8080
testsender.target.token=phoss-ap-development-token

# HTTP client
testsender.http.connect-timeout-ms=5000
testsender.http.read-timeout-ms=60000

# Default Peppol IDs for XML/PDF scenarios
testsender.peppol.sender-id=iso6523-actorid-upis::9915:phoss-ap-test-sender
testsender.peppol.receiver-id=iso6523-actorid-upis::9915:helger
testsender.peppol.doc-type-id=busdox-docid-qns::urn:oasis:names:specification:ubl:schema:xsd:Invoice-2::Invoice##urn:cen.eu:en16931:2017#compliant#urn:fdc:peppol.eu:2017:poacc:billing:3.0::2.1
testsender.peppol.process-id=cenbii-procid-ubl::urn:fdc:peppol.eu:2017:poacc:billing:01:1.0
testsender.peppol.c1-country-code=AT

# PDF-specific SBDH overrides
testsender.pdf.sbdh-standard=urn:peppol:doctype:pdf+xml
testsender.pdf.sbdh-type-version=0
testsender.pdf.sbdh-type=factur-x

# Sample document paths (classpath: or absolute file paths)
testsender.samples.xml=classpath:samples/invoice-ubl.xml
testsender.samples.sbd=classpath:samples/prebuilt-sbd.xml
testsender.samples.pdf=classpath:samples/factur-x.pdf

# Bulk mode
testsender.bulk.enabled=false
testsender.bulk.threads=10
testsender.bulk.count=100
testsender.bulk.ramp-up-ms=0
testsender.bulk.document-types=xml
testsender.bulk.mix-ratio=100

# Status polling after send
testsender.poll.enabled=true
testsender.poll.timeout-ms=30000
testsender.poll.interval-ms=2000

# Output
testsender.output.file=
testsender.output.verbose=false

# Disable embedded web server - this is a CLI application
spring.main.web-application-type=none

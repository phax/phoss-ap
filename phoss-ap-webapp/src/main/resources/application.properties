# phoss-ap application configuration
spring.application.name=phoss-ap
server.port=8080

# === Database (PostgreSQL) ===
jdbc.database-type=postgresql
jdbc.url=jdbc:postgresql://localhost:5432/phoss_ap
jdbc.user=peppol
jdbc.password=peppol
jdbc.schema=ap

# Connection pool
#jdbc.pool.initial-size=2
#jdbc.pool.max-total=20
#jdbc.pool.max-idle=10
#jdbc.pool.min-idle=2

# Flyway
#flyway.enabled=true
#flyway.jdbc.url=${jdbc.url}
#flyway.jdbc.user=${jdbc.user}
#flyway.jdbc.password=${jdbc.password}

# === Peppol Identity ===
peppol.stage=test
peppol.seatid=POP000306
peppol.owner.countrycode=AT

# === API Security ===
#phase4.api.requiredtoken=

# === AS4 / phase4 ===
org.apache.wss4j.crypto.merlin.keystore.type=pkcs12
org.apache.wss4j.crypto.merlin.keystore.file=test-ap-2025-g3.p12
org.apache.wss4j.crypto.merlin.keystore.password=peppol
org.apache.wss4j.crypto.merlin.keystore.alias=private_key_for_pkcs12_certificate
org.apache.wss4j.crypto.merlin.keystore.private.password=peppol

org.apache.wss4j.crypto.merlin.truststore.type=pkcs12
# All these truststores are predefined, and are part of the peppol-commons library
#   See https://github.com/phax/peppol-commons/tree/master/peppol-commons/src/main/resources/truststore
#
# For Test only use:       truststore/2025/ap-test-truststore.p12
# For Production only use: truststore/2025/ap-prod-truststore.p12
org.apache.wss4j.crypto.merlin.truststore.file=truststore/2025/ap-test-truststore.p12
org.apache.wss4j.crypto.merlin.truststore.password=peppol

# === Peppol Reporting ===
peppol.reporting.jdbc.database-type=postgresql
peppol.reporting.jdbc.driver=org.postgresql.Driver
peppol.reporting.jdbc.url=jdbc:postgresql://localhost:5432/phoss-ap
peppol.reporting.jdbc.user=peppol
peppol.reporting.jdbc.password=peppol
peppol.reporting.jdbc.schema=reporting
peppol.reporting.flyway.jdbc.schema-create=true

peppol.report.jdbc.database-type=${peppol.reporting.jdbc.database-type}
peppol.report.jdbc.driver=${peppol.reporting.jdbc.driver}
# The following property requires building by Docker
peppol.report.jdbc.url=${peppol.reporting.jdbc.url}
peppol.report.jdbc.user=${peppol.reporting.jdbc.user}
peppol.report.jdbc.password=${peppol.reporting.jdbc.password}
peppol.report.jdbc.schema=report
peppol.report.flyway.jdbc.schema-create=true


# === Outbound Sending ===
#phase4.send.timeout.connection.ms=5000
#phase4.send.timeout.request.ms=10000
#phase4.send.timeout.response.ms=30000

# === Retry (Sending) ===
#retry.sending.enabled=true
#retry.sending.interval.ms=30000
#retry.sending.batch-size=50
#retry.sending.max-attempts=5
#retry.sending.initial-backoff.ms=60000
#retry.sending.backoff-multiplier=2.0
#retry.sending.max-backoff.ms=3600000

# === Retry (Forwarding) ===
#retry.forwarding.enabled=true
#retry.forwarding.interval.ms=30000
#retry.forwarding.batch-size=50
#retry.forwarding.max-attempts=5
#retry.forwarding.initial-backoff.ms=60000
#retry.forwarding.backoff-multiplier=2.0
#retry.forwarding.max-backoff.ms=3600000

# === Forwarding ===
#forwarding.mode=http_post_async
#forwarding.http.url=
#forwarding.http.timeout.connection.ms=5000
#forwarding.http.timeout.response.ms=30000

# === Circuit Breaker ===
#circuit-breaker.failure-threshold=5
#circuit-breaker.open-duration.ms=60000
#circuit-breaker.half-open-max-attempts=3

# === Duplicate Detection ===
#duplicate-detection.as4.mode=store_and_flag
#duplicate-detection.sbdh.mode=store_and_flag

# === Verification ===
#verification.inbound.enabled=false
#verification.outbound.enabled=false

# === MLS ===
#mls.type=failure_only

# === Archival ===
#archival.scheduler.enabled=false
#archival.scheduler.interval.ms=86400000

# === Startup Recovery ===
#startup.recovery.enabled=true


# === Spring Boot ===
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# === Actuator ===
management.endpoints.web.exposure.include=health,info
management.endpoint.shutdown.enabled=true
endpoints.shutdown.enabled=true
